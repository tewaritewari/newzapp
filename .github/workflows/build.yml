name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.2'

      # 🔥 DELETE old android folder (key fix)
      - name: Remove old Android config
        run: rm -rf android

      # 🔥 RECREATE proper Flutter project
      - name: Recreate Flutter structure
        run: flutter create .

      - name: Install dependencies
        run: flutter pub get

      - name: Accept licenses
        run: yes | flutter doctor --android-licenses

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk
